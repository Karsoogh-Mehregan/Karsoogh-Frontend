name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare .env for build
        run: |
          API_URL="${{ vars.PROD_VITE_API_BASE_URL }}"
          if [ -z "$API_URL" ]; then
            API_URL="http://localhost:8000"
          fi
          printf 'APP_ENV=development\nVITE_API_BASE_URL=%s\n' "$API_URL" > .env

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run type-check

      - name: Test
        run: npm run test -- --coverage

      - name: Build
        run: npm run build
